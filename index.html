<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
		<link rel="shortcut icon" href="/favicon.png" />
		<meta property="og:title" content="Deep Mandelbrot" />
		<meta property="og:description" content="Deep Mandelbrot set viewer accelerated using WebGL" />
		<meta property="og:image" content="https://mandelbrot-bgn.pages.dev/favicon.png" />
		<meta property="og:color" content="#EE5522" />
		<title>Deep Mandelbrot</title>
		<script src="shader.js" defer></script>
	</head>
	<body>
		<canvas id="canvas" width="1024" height="1024"></canvas>
		<div title="click to copy coords" id="stats"></div>
		<input type="range" min="0" max="20" value="4" id="slider" />
		<div id="info"></div>
		<div id="save">save image</div> <div id="fs">fullscreen</div>
		<div id="prec">Precision:<div id="lp">lock</div><div id="ip">inc.</div></div>
		<div id="auto">auto</div>
		<input type="range" id="supersample" min="-4" max="1" value="0" />
		<input type="range" id="gradient" min="-5" value="2" max="10" step="0.01" />
		<input type="range" id="gradient2" min="0" value="0" max="1" step="0.001" />
		<input type="checkbox" id="smooth" checked />
		<select id="mode"></select>
		<select id="fractal"></select>
		<input type="checkbox" id="live" />
		<input type="range" id="r" min="-2" value="0" max="2" step="0.001" data-v="0.000" oninput="{let v = +this.value; if(v>-0.03&&v<0.03)this.value=v=0;this.dataset.v=v.toFixed(3);if(live.checked)draw()}" onchange="draw()" />
		<input type="range" id="i" min="-2" value="0" max="2" step="0.001" data-v="0.000" oninput="{let v = +this.value; if(v>-0.03&&v<0.03)this.value=v=0;this.dataset.v=v.toFixed(3);if(live.checked)draw()}" onchange="draw()" />
		</select>
  </body>
	<style>
		input{ touch-action: manipulation; text-shadow: inherit; font: inherit; color: inherit; }
		canvas{
			width: 100%;
			height: 100%;
			bottom: 0;
			left: 0;
			position: absolute;
			flex-shrink: 0;
			transform-origin: bottom left;
			z-index: 0;
			background: #000;
			touch-action: none;
		}
		body{
			font-size: 14px;
			line-height: 15px;
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			margin: 0;
			background: #444;
			font-family: AnkaCoder, monospace;
			color: white;
			width: 100%;
			height: 100%;
			overflow: hidden;
			text-shadow: 0 0 8px black;
		}
		:root{
			width: 100%;
			height: 100%;
			overflow: hidden;
			text-size-adjust: none;
			position: relative;
		}
		#stats{
			cursor: pointer;
			white-space: pre-wrap;
			position: absolute;
			top: 5px;
			left: 5px;
			padding: 5px;
			border-radius: 5px;
			background: #0003;
		}
		#slider{
			position: absolute;
			right: 10px;
			bottom: 10px;
			width: 300px;
			margin: 0; padding: 0;
		}
		#auto, #save, #fs, #lp, #ip{
			bottom: 30px;
			right: 10px;
			height: 24px;
			font-size: 14px;
			width: 50px;
			border-radius: 5px;
			background: #0003;
			cursor: pointer;
			display: flex;
			align-items: center;
			padding-bottom: 2px;
			justify-content: center;
			box-sizing: border-box;
			flex-shrink: 0;
		}
		#auto{ position: absolute; }
		#save, #fs, #prec{
			position: absolute;
			bottom: unset;
			right: unset;
			top: 96px;
			left: 5px;
			width: 100px;
			user-select: none;
			-webkit-user-select: none;
		}
		#prec{
			top: 126px; display: flex;
			gap: 10px; align-items: center;
		}
		#fs{ left: 110px; }
		#info, #supersample{
			position: absolute;
			bottom: 30px;
			right: 70px;
			height: 24px;
			gap: 5px;
			font-size: 14px;
			cursor: pointer;
			display: flex;
			align-items: center;
			padding-bottom: 2px;
			justify-content: center;
			box-sizing: border-box;
			text-shadow: 0 0 5px black;
		}
		#supersample{
			right: 170px;
			width: 140px;
			margin: 0;
		}
		#gradient, #mode, #gradient2{
			position: absolute;
			bottom: 10px;
			left: 10px;
			width: 220px;
			margin: 0; padding: 0;
		}
		#gradient2{
			position: absolute;
			bottom: 35px; left: 160px; width: 100px;
		}
		#smooth{
			position: absolute;
			margin: 0; padding: 0;
			bottom: 10px;
			left: 240px;
			cursor: pointer;
			height: 19px; width: 19px;
		}
		#mode, #fractal{
			outline: none;
			bottom: 35px;
			border-color: #8888;
    		border-radius: 100px;
			width: 140px;
		}
		#fractal{
			position: absolute;
			bottom: unset;
			width: 200px;
			top: 10px; right: 10px;
			margin: 0;
		}
		#r, #i, #live{
			position: absolute;
			top: 35px;
			right: 10px;
			width: 200px;
			margin: 0; padding: 0;
		}
		#live{
			top: 10px;
			right: 220px;
			height: 19px;
			width: 19px;
		}
		#r:before, #i:before{
			position: absolute; content: 'r = ' attr(data-v);
			right: 100%;
			padding-right: 10px;
			white-space: pre;
		}
		#i:before{ content: 'i = ' attr(data-v); }
		#i{ top: 55px }
		@media screen and (max-width: 600px) and (orientation: portrait){
			:root{ width: var(--h); height: 100vw; transform: rotate(0.25turn); left: 100%; transform-origin: top left; }
		}
	</style>
</html>
